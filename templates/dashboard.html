<!DOCTYPE html>
<html>
<head>
    <title>AI Study Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        /* 🔥 Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout {
            background: white;
            color: #333;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout:hover {
            background: #ff4d4d;
            color: white;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* Table */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: rgba(255,255,255,0.2);
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
        }

        canvas {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
        }

        /* Animation */
        .fade {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @media(max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="container fade">

    <!-- Top -->
    <div class="top-bar">
        <h2>👋 Welcome, {{ user }}</h2>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- Cards -->
    <div class="cards">

        <div class="glass card">
            <h3>⏱ Total Study</h3>
            <h2>{{ total_time }} min</h2>
        </div>

        <div class="glass card">
            <h3>🔥 Streak</h3>
            <h2>{{ streak }} days</h2>
        </div>

        <div class="glass card">
            <h3>🤖 AI Prediction</h3>
            <p>{{ prediction }}</p>
        </div>

    </div>

    <!-- Table -->
    <div class="glass">
        <table>
            <tr>
                <th>📘 Subject</th>
                <th>⏱ Time</th>
                <th>📅 Date</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <!-- Chart -->
    <canvas id="chart"></canvas>

</div>

<script>
    let labels = {{ labels | tojson }};
    let values = {{ values | tojson }};

    new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '📊 Study Progress',
                data: values,
                borderWidth: 3,
                tension: 0.4
            }]
        }
    });
</script>

</body>
</html>
