<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        canvas {
            margin-top: 30px;
        }

        .logout {
            float: right;
        }
    </style>
</head>
<body>

<div class="container">

    <a href="/logout" class="logout">Logout</a>

    <h2>Welcome, {{ user }} 👋</h2>

    <h3>Total Study Time: {{ total_time }} minutes</h3>
    <h3 style="text-align:center; color:#4CAF50;">
    {{ prediction }}
</h3>

    <!-- Table -->
    <table>
        <tr>
            <th>Subject</th>
            <th>Study Time</th>
            <th>Date</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <!-- Graph -->
    <canvas id="studyChart"></canvas>

</div>

<script>
    let labels = {{ labels | tojson | safe }};
    let values = {{ values | tojson | safe }};

    // 👇 fallback if empty
    if (!labels || labels.length === 0) {
        labels = ["No Data"];
        values = [0];
    }

    new Chart(document.getElementById("studyChart"),{
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Study Time',
                data: values,
                borderWidth: 2
            }]
        }
    });
</script>

</body>
</html>
